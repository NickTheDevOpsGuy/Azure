name: 🚀 Deploy Lab 5 - Instrumentation Lab

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 🌐 Deploy to Azure

    permissions:
      id-token: write
      contents: read

    steps:
      - name: 🧾 Checkout Repo
        uses: actions/checkout@v4

      - name: 🔐 Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 📦 Deploy Bicep Template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: NickClarkRG
          template: AZ-400/labs/lab-5-az400-instrumentation-lab/infra/main.bicep
          parameters: AZ-400/labs/lab-5-az400-instrumentation-lab/infra/parameters.json
          deploymentName: lab5-${{ github.run_number }}
          deploymentMode: Incremental

      - name: ✅ Tag Commit as Deployed
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag deployed-lab5-${{ github.run_number }}
          git push origin deployed-lab5-${{ github.run_number }}