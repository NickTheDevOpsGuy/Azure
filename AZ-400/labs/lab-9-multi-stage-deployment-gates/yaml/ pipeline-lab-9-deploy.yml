trigger:
- main

variables:
  location: 'eastus'
  buildId: $[variables['Build.BuildId']]

pool:
  vmImage: ubuntu-latest

stages:
- stage: Dev
  displayName: 'Deploy to Dev'
  jobs:
  - deployment: DeployDev
    displayName: 'Deploy Dev Job'
    environment: 'Dev'
    variables:
      resourceGroupName: 'lab9-dev-rg'
      storageAccountName: $[format('lab9dev{0}', variables['buildId'])]
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'NICKSERVICECONNECT'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "✅ Deploying to Dev environment"
                az group create --name $(resourceGroupName) --location $(location)
                az storage account create \
                  --name $(storageAccountName) \
                  --resource-group $(resourceGroupName) \
                  --location $(location) \
                  --sku Standard_LRS
            displayName: 'Deploy Dev Resources'

- stage: Staging
  displayName: 'Deploy to Staging'
  dependsOn: Dev
  condition: succeeded()
  jobs:
  - deployment: DeployStaging
    displayName: 'Deploy Staging Job'
    environment: 'Staging'
    variables:
      resourceGroupName: 'lab9-staging-rg'
      storageAccountName: $[format('lab9stg{0}', variables['buildId'])]
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'NICKSERVICECONNECT'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "✅ Deploying to Staging environment"
                az group create --name $(resourceGroupName) --location $(location)
                az storage account create \
                  --name $(storageAccountName) \
                  --resource-group $(resourceGroupName) \
                  --location $(location) \
                  --sku Standard_LRS
            displayName: 'Deploy Staging Resources'

- stage: Production
  displayName: 'Deploy to Production'
  dependsOn: Staging
  condition: succeeded()
  jobs:
  - deployment: DeployProd
    displayName: 'Deploy Prod Job'
    environment: 'Production'
    variables:
      resourceGroupName: 'lab9-prod-rg'
      storageAccountName: $[format('lab9prod{0}', variables['buildId'])]
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'NICKSERVICECONNECT'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "✅ Deploying to Production environment"
                az group create --name $(resourceGroupName) --location $(location)
                az storage account create \
                  --name $(storageAccountName) \
                  --resource-group $(resourceGroupName) \
                  --location $(location) \
                  --sku Standard_LRS
            displayName: 'Deploy Prod Resources'