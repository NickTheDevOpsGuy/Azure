# CI pipeline goes here
name: Build and Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint < src/frontend/Dockerfile
          docker run --rm -i hadolint/hadolint < src/api/Dockerfile

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.11.2
        with:
          image-ref: ghcr.io/YOUR_ORG/voting-api:latest
          format: table
          scan-type: config

      - name: Build frontend
        run: docker build -t voting-frontend ./src/frontend

      - name: Build API
        run: docker build -t voting-api ./src/api