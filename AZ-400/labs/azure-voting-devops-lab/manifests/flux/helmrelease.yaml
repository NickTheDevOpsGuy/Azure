apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: voting-app
  namespace: default
spec:
  releaseName: voting-app
  chart:
    spec:
      chart: ./helm
      sourceRef:
        kind: GitRepository
        name: voting-app
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: values-dev