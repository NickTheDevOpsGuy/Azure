apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: error-rate
spec:
  groups:
    - name: error.rules
      rules:
        - alert: HighErrorRate
          expr: rate(http_requests_total{status=~\"5..\"}[5m]) > 0.05
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: High 5xx error rate